<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src __CSP_SOURCE__ https: data: blob:; style-src __CSP_SOURCE__; script-src 'nonce-__NONCE__' __CSP_SOURCE__ https:; connect-src __CSP_SOURCE__ https: data: blob:; worker-src blob:;">
    <title>Ship 3D Viewer</title>
    <link rel="stylesheet" href="__SHIPS_CSS_URI__">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Ship 3D Viewer</h1>
                <input id="search" class="search" placeholder="Filter by key/name/art root" />
            </div>
            <div id="shipList" class="ship-list"></div>
        </aside>
        <section class="viewer">
            <div class="viewer-header">
                <div>
                    <div id="title" class="title">No ship selected</div>
                    <div id="subtitle" class="sub">Choose a ship on the left.</div>
                </div>
                <div class="viewer-actions">
                    <button id="copyKeyBtn" class="copy-key-btn">Copy Ship Key</button>
                    <button id="diffuseToggleBtn" class="map-toggle-btn material-setting-btn active">Diffuse On</button>
                    <button id="diffuseRotateBtn" class="map-rotate-btn material-setting-btn">Diffuse Rot 0deg</button>
                    <button id="specularToggleBtn" class="map-toggle-btn material-setting-btn active">Specular On</button>
                    <button id="specularRotateBtn" class="map-rotate-btn material-setting-btn">Specular Rot 0deg</button>
                    <button id="emissiveToggleBtn" class="map-toggle-btn material-setting-btn active">Emissive On</button>
                    <button id="emissiveRotateBtn" class="map-rotate-btn material-setting-btn">Emissive Rot 0deg</button>
                    <button id="normalToggleBtn" class="map-toggle-btn material-setting-btn active">Normal On</button>
                    <button id="normalRotateBtn" class="map-rotate-btn material-setting-btn">Normal Rot 0deg</button>
                    <button id="mapDebugBtn" class="map-debug-btn">Show Map Debug</button>
                    <button id="insertKeyBtn" class="insert-key-btn" hidden>Insert Selected Ship Key</button>
                </div>
            </div>
            <div class="viewer-stage">
                <canvas id="viewport"></canvas>
                <div id="overlay" class="overlay">Waiting for selection...</div>
                <div id="mapDebugPanel" class="map-debug-panel" hidden></div>
                <div id="preview" class="preview"><img id="previewImg" alt="preview" /></div>
            </div>
        </section>
    </div>

    <script nonce="__NONCE__" type="importmap">__IMPORT_MAP__</script>
    <script nonce="__NONCE__">window.__SHIP_ENTRIES__ = __SHIP_ENTRIES_JSON__;</script>
    <script nonce="__NONCE__">window.__SHIP_VIEWER_CONFIG__ = __SHIP_VIEWER_CONFIG_JSON__;</script>
    <script nonce="__NONCE__" type="module" src="__SHIPS_JS_URI__"></script>
</body>
</html>
